name: 작업 요청
description: Markdown·JSON 책임 원본·사람용 최신 PDF·분야·게이트·선택적 스킬·검증을 갖춘 게임 제작 작업 요청
labels: []
body:
  - type: markdown
    attributes:
      value: |
        작업 전에 주 책임 분야, 영향 분야, 관련 Markdown 또는 JSON 책임 원본, 현재 게이트와 Registry에서 선택한 최소 스킬을 지정합니다. 승인·구현·검증·사람용 발행 상태를 구분합니다.

  - type: dropdown
    id: project_mode
    attributes:
      label: 프로젝트·작업 모드
      options:
        - 일반 운영 작업
        - 신규 운영체계 설치
        - 기존 프로젝트 Audit only
        - 승인된 기존 프로젝트 마이그레이션
        - Markdown·JSON 기획서·PDF 발행
        - GitHub Enforcement 설치·검증
        - 운영체계 Health Review
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: 목표와 사용자·플레이어 가치
      description: 무엇을 왜 바꾸며 어떤 관찰 가능한 가치가 생기는지 적습니다.
    validations:
      required: true

  - type: dropdown
    id: primary_discipline
    attributes:
      label: 주 책임 분야
      options:
        - 프로젝트 전체
        - 설정·내러티브
        - 게임 디자인
        - UX·UI·접근성
        - 개발·엔지니어링
        - 테크니컬 아트·콘텐츠 파이프라인
        - 아트
        - 사운드
        - QA
        - 프로덕션·PM
        - 분석·유저리서치
        - 통합검수
        - 프로젝트 허브·Foundation 운영
    validations:
      required: true

  - type: checkboxes
    id: affected_disciplines
    attributes:
      label: 영향 분야
      options:
        - label: 설정·내러티브
        - label: 게임 디자인
        - label: UX·UI·접근성
        - label: 개발·엔지니어링
        - label: 테크니컬 아트·콘텐츠 파이프라인
        - label: 아트
        - label: 사운드
        - label: QA
        - label: 프로덕션·PM
        - label: 분석·유저리서치
        - label: 통합검수

  - type: dropdown
    id: change_type
    attributes:
      label: 변경 유형
      options:
        - 방향·대상 플레이어
        - 세계관·명칭·시나리오
        - 게임 규칙·밸런스
        - UX·UI·접근성
        - 코드·Scene·데이터
        - 자산 규격·Import
        - 이미지·애니메이션·VFX
        - 사운드·음성
        - 테스트·버그·성능
        - 일정·범위·예산·위험
        - 분석·벤치마킹·유저리서치
        - 개발 게이트·마일스톤
        - 프로젝트 스킬·Registry·학습
        - Markdown·JSON 책임 원본·PDF·선택 DOCX/다이어그램
        - 승인 이미지·실제 캡처
        - 문서·경로·운영체계
        - 기존 프로젝트 마이그레이션·수명주기
    validations:
      required: true

  - type: dropdown
    id: current_gate
    attributes:
      label: 현재 작업 게이트
      options:
        - Intake·Context
        - Definition of Ready 검수
        - Planning·Approval
        - Implementation
        - Verification
        - Documentation·Publication
        - Integration·Completion
        - 제품 마일스톤 Greenlight 검수
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 포함 범위
      description: 변경할 기능·책임 원본·스킬·자산·PDF/Manifest·선택 파생본·파일 범위를 적습니다.
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: 제외 범위와 보호 대상
      description: 바꾸지 않을 결정, 데이터, 자산, 동작, 경로를 적습니다.
    validations:
      required: true

  - type: textarea
    id: sources
    attributes:
      label: 먼저 읽을 Registry·JSON·실제 파일
      description: START_HERE, 두 Registry, 관련 Markdown 또는 JSON 책임 원본, 실제 코드·데이터·자산·테스트를 적습니다.
    validations:
      required: true

  - type: textarea
    id: skills
    attributes:
      label: 적용할 최소 Foundation·분야 스킬
      description: Skill Registry Trigger, 호출 스킬, 호출하지 않을 후속 스킬과 Learning Log를 적습니다.
    validations:
      required: true

  - type: textarea
    id: publication
    attributes:
      label: 사람용 PDF·선택 DOCX/다이어그램·승인 이미지 영향
      description: 재생성할 문서 ID, 승인 이미지, Manifest, 자동·사람 시각 검수를 적습니다.
    validations:
      required: true

  - type: textarea
    id: lifecycle
    attributes:
      label: 보존·백업·보류·제거 후보 영향
      description: 기존 프로젝트이면 보존 대상, 재개 조건, 제거 후보와 승인 필요 여부를 적습니다.

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: 조건 → 행동 → 관찰 결과로 완료 기준을 적습니다.
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: 검증 계획
      description: 자동 테스트, 정상·실패 경로, 실제 플레이, 세 Governance Checker, DOCX/PDF 생성·렌더와 사용자 검수를 적습니다.
    validations:
      required: true

  - type: checkboxes
    id: ready
    attributes:
      label: Definition of Ready
      options:
        - label: 목적과 사용자·플레이어 가치가 명확합니다.
          required: true
        - label: 포함·제외 범위와 보호 대상이 있습니다.
          required: true
        - label: 관련 Design Document ID·JSON과 실제 대상 파일을 확인했습니다.
          required: true
        - label: Registry Trigger에 따라 최소 스킬을 지정했습니다.
          required: true
        - label: 사람용 PDF·Manifest·선택 파생본·자산 발행 영향을 판정했습니다.
          required: true
        - label: 완료 기준과 검증 방법이 있습니다.
          required: true
        - label: 미확정·보류·미검증을 구현 범위와 분리했습니다.
          required: true
        - label: 기존 프로젝트라면 승인 전 대규모 삭제·이동·통합을 하지 않습니다.
          required: true
