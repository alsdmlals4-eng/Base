<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UI 아트 감사 Web After</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <p class="context">균열 대응 / 제7 관측소</p>
        <h1>심연 관측소</h1>
        <p class="intro">균열의 신호를 판독하고 대원에게 다음 행동을 명확히 전달하세요.</p>
      </div>
      <p class="status"><strong>경계 2단계</strong><span>신호가 불안정합니다</span></p>
    </header>
    <section class="steps" aria-label="관측 절차">
      <article><span>1</span><div><h2>신호 분석</h2><p>불안정한 파형 4개를 분류합니다.</p></div></article>
      <article><span>2</span><div><h2>대원 배치</h2><p>가용 인원 3명의 역할을 확인합니다.</p></div></article>
      <article><span>3</span><div><h2>진입 결정</h2><p>위험도와 예상 보상을 비교합니다.</p></div></article>
    </section>
    <footer><p>다음 단계: 신호 분석</p><button>관측 시작</button></footer>
  </main>
</body>
</html>
