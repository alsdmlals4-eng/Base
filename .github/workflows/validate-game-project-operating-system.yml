name: Validate Game Project Operating System

on:
  pull_request:
    paths:
      - "START_HERE.md"
      - "AGENTS.md"
      - "README.md"
      - "docs/**"
      - "skills/**"
      - "tools/**"
      - "schemas/**"
      - '\[수정제안서\]/**'
      - "requirements-publication.txt"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "templates/project-operations/**"
      - "templates/planning/**"
      - "templates/quality/**"
      - "tests/test_*operating_system*.py"
      - "tests/test_documentation_governance.py"
      - "tests/test_skill_routing_governance.py"
      - "tests/test_design_document_*.py"
      - "tests/test_policy_driven_publication.py"
      - "tests/test_consolidated_skill_references.py"
      - "tests/test_reference_freshness.py"
      - "tests/test_skill_package_integrity.py"
      - "tests/test_skill_system_coverage.py"
      - "tests/test_project_skill_map_generation.py"
      - "tests/test_base_change_proposals.py"
      - "tests/test_deep_interview_contract.py"
      - "tests/test_gpt_codex_workflow_contract.py"
      - "tests/test_ci_workflow_cost_policy.py"
      - "tests/test_ui_art_audit.py"
      - ".github/reference-freshness.json"
      - ".github/workflows/validate-game-project-operating-system.yml"
  push:
    branches:
      - main
    paths:
      - "START_HERE.md"
      - "AGENTS.md"
      - "README.md"
      - "docs/**"
      - "skills/**"
      - "tools/**"
      - "schemas/**"
      - '\[수정제안서\]/**'
      - "requirements-publication.txt"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "templates/**"
      - "tests/**"
      - ".github/reference-freshness.json"
      - ".github/workflows/validate-game-project-operating-system.yml"
  schedule:
    - cron: "15 18 * * *"
  workflow_dispatch:
    inputs:
      validation_level:
        description: Validation tier to run
        required: true
        default: auto
        type: choice
        options:
          - auto
          - docs
          - contract
          - code
          - full

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  classify-changes:
    name: classify-changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
      canonical_contract: ${{ steps.classify.outputs.canonical_contract }}
      code_or_engine: ${{ steps.classify.outputs.code_or_engine }}
      ci_toolchain_high_risk: ${{ steps.classify.outputs.ci_toolchain_high_risk }}
      full_matrix: ${{ steps.classify.outputs.full_matrix }}
      platform_smoke: ${{ steps.classify.outputs.platform_smoke }}
      run_contract: ${{ steps.classify.outputs.run_contract }}
      run_publication: ${{ steps.classify.outputs.run_publication }}
      run_windows: ${{ steps.classify.outputs.run_windows }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Classify changed files
        id: classify
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          VALIDATION_LEVEL: ${{ github.event.inputs.validation_level || 'auto' }}
        run: |
          set -euo pipefail

          level=""
          platform_smoke=false

          if [[ "$GITHUB_EVENT_NAME" == "schedule" || "$GITHUB_EVENT_NAME" == "push" ]]; then
            level=full
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$VALIDATION_LEVEL" != "auto" ]]; then
            level="$VALIDATION_LEVEL"
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            level=full
          else
            if [[ -z "$BASE_SHA" || -z "$HEAD_SHA" ]]; then
              echo "Missing pull request base/head SHA; escalating to CI high risk."
              level=ci
            else
              git diff --name-only "$BASE_SHA...$HEAD_SHA" > changed-files.txt
              cat changed-files.txt

              has_canonical=false
              has_code=false
              has_ci=false

              while IFS= read -r path; do
                [[ -z "$path" ]] && continue
                case "$path" in
                  .github/workflows/*|tests/test_ci_workflow_cost_policy.py)
                    has_ci=true
                    ;;
                  tools/build_design_documents.py|tools/build_policy_driven_design_documents.py|tools/design_document_diagrams.py|tools/publication_v3.py|tools/check_publication_environment.py|tests/test_design_document_publication_governance.py|tests/test_design_document_generation.py|tests/test_policy_driven_publication.py|tests/test_project_skill_map_generation.py|tests/test_ui_art_audit.py|requirements-publication.txt|package.json|pnpm-lock.yaml|pnpm-workspace.yaml)
                    has_code=true
                    platform_smoke=true
                    ;;
                  tools/*|tests/*|*.py|*.js|*.mjs|*.cjs|*.ts|*.tsx|*.gd|*.tscn|*.tres|project.godot)
                    has_code=true
                    ;;
                  AGENTS.md|START_HERE.md|docs/OPERATING_MODEL.md|docs/WORK_MODE_AND_SKILL_ROUTING.md|docs/DOCUMENTATION_MAP.md|docs/GPT_CODEX_WORKFLOW_POLICY.md|docs/CI_EXECUTION_COST_POLICY.md|skills/*|schemas/*|templates/*|.github/reference-freshness.json)
                    has_canonical=true
                    ;;
                  README.md|docs/*|*.md|*.txt)
                    ;;
                  *)
                    echo "Unknown change path '$path'; escalating to code validation."
                    has_code=true
                    ;;
                esac
              done < changed-files.txt

              if [[ "$has_ci" == true ]]; then
                level=ci
              elif [[ "$has_code" == true ]]; then
                level=code
              elif [[ "$has_canonical" == true ]]; then
                level=contract
              else
                level=docs
              fi
            fi
          fi

          case "$level" in
            docs)
              docs_only=true
              canonical_contract=false
              code_or_engine=false
              ci_toolchain_high_risk=false
              full_matrix=false
              run_contract=false
              run_publication=false
              run_windows=false
              ;;
            contract)
              docs_only=false
              canonical_contract=true
              code_or_engine=false
              ci_toolchain_high_risk=false
              full_matrix=false
              run_contract=true
              run_publication=false
              run_windows=false
              ;;
            code)
              docs_only=false
              canonical_contract=false
              code_or_engine=true
              ci_toolchain_high_risk=false
              full_matrix=false
              run_contract=true
              run_publication=true
              run_windows="$platform_smoke"
              ;;
            ci)
              docs_only=false
              canonical_contract=false
              code_or_engine=false
              ci_toolchain_high_risk=true
              full_matrix=false
              platform_smoke=true
              run_contract=true
              run_publication=true
              run_windows=true
              ;;
            full)
              docs_only=false
              canonical_contract=false
              code_or_engine=false
              ci_toolchain_high_risk=false
              full_matrix=true
              platform_smoke=true
              run_contract=true
              run_publication=true
              run_windows=true
              ;;
            *)
              echo "Unsupported validation level '$level'."
              exit 1
              ;;
          esac

          {
            echo "docs_only=$docs_only"
            echo "canonical_contract=$canonical_contract"
            echo "code_or_engine=$code_or_engine"
            echo "ci_toolchain_high_risk=$ci_toolchain_high_risk"
            echo "full_matrix=$full_matrix"
            echo "platform_smoke=$platform_smoke"
            echo "run_contract=$run_contract"
            echo "run_publication=$run_publication"
            echo "run_windows=$run_windows"
          } >> "$GITHUB_OUTPUT"

          echo "Selected validation level: $level"

  docs-validation:
    name: docs-validation
    needs: classify-changes
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Set up baseline Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate whitespace and lightweight contracts
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            git diff --check "$BASE_SHA...$HEAD_SHA"
          elif [[ "$GITHUB_EVENT_NAME" == "push" && -n "$BEFORE_SHA" && ! "$BEFORE_SHA" =~ ^0+$ ]]; then
            git diff --check "$BEFORE_SHA...$GITHUB_SHA"
          else
            git diff --check "${GITHUB_SHA}^...${GITHUB_SHA}"
          fi

          python -m unittest \
            tests/test_gpt_codex_workflow_contract.py \
            tests/test_ci_workflow_cost_policy.py \
            -v

  ubuntu-contract:
    name: ubuntu-contract
    needs: classify-changes
    if: needs.classify-changes.outputs.run_contract == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-publication.txt

      - name: Install contract dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-publication.txt

      - name: Check Python syntax
        run: |
          python -m py_compile \
            tools/build_project_skill_map.py \
            tools/skill_map_diagrams.py \
            tools/build_design_documents.py \
            tools/build_policy_driven_design_documents.py \
            tools/design_document_diagrams.py \
            tools/publication_v3.py \
            tools/check_publication_environment.py \
            tools/check_base_change_proposals.py \
            tools/check_interview_contract.py \
            tools/audit_external_source.py \
            tools/check_canonical_reference_freshness.py \
            tools/check_skill_system_coverage.py \
            skills/auditing-and-refining-ui-art/scripts/scan_ui_art_signals.py \
            templates/project-operations/github/check_documentation_governance.py \
            templates/project-operations/github/check_skill_routing_governance.py \
            templates/project-operations/github/check_design_document_publications.py \
            tests/test_documentation_governance.py \
            tests/test_skill_routing_governance.py \
            tests/test_consolidated_skill_references.py \
            tests/test_reference_freshness.py \
            tests/test_skill_package_integrity.py \
            tests/test_skill_system_coverage.py \
            tests/test_game_project_operating_system_structure.py \
            tests/test_base_change_proposals.py \
            tests/test_deep_interview_contract.py \
            tests/test_gpt_codex_workflow_contract.py \
            tests/test_ci_workflow_cost_policy.py

      - name: Validate Base change proposals
        if: github.event_name == 'pull_request'
        run: python tools/check_base_change_proposals.py --base-ref "${{ github.event.pull_request.base.sha }}"

      - name: Check canonical reference freshness
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -o pipefail
          python tools/check_canonical_reference_freshness.py \
            --config .github/reference-freshness.json \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            2>&1 | tee reference-freshness-results.txt

      - name: Run contract and governance regression tests
        shell: bash
        run: |
          set -o pipefail
          python -m unittest \
            tests/test_documentation_governance.py \
            tests/test_skill_routing_governance.py \
            tests/test_consolidated_skill_references.py \
            tests/test_reference_freshness.py \
            tests/test_skill_package_integrity.py \
            tests/test_skill_system_coverage.py \
            tests/test_game_project_operating_system_structure.py \
            tests/test_base_change_proposals.py \
            tests/test_deep_interview_contract.py \
            tests/test_gpt_codex_workflow_contract.py \
            tests/test_ci_workflow_cost_policy.py \
            -v 2>&1 | tee operating-system-contract-results.txt
          python tools/check_skill_system_coverage.py \
            2>&1 | tee -a operating-system-contract-results.txt

      - name: Upload contract diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: operating-system-contract-diagnostics
          path: |
            reference-freshness-results.txt
            operating-system-contract-results.txt
          if-no-files-found: warn
          retention-days: 1

  publication-validation:
    name: publication-validation
    needs: classify-changes
    if: needs.classify-changes.outputs.run_publication == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-publication.txt

      - name: Set up Node and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install publication dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-writer fonts-nanum poppler-utils
          python -m pip install --upgrade pip
          python -m pip install -r requirements-publication.txt
          corepack enable
          corepack prepare pnpm@11.9.0 --activate
          pnpm install --frozen-lockfile

      - name: Run publication and generation tests
        shell: bash
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
        run: |
          set -o pipefail
          python -m unittest \
            tests/test_design_document_publication_governance.py \
            tests/test_design_document_generation.py \
            tests/test_policy_driven_publication.py \
            tests/test_project_skill_map_generation.py \
            tests/test_ui_art_audit.py \
            -v 2>&1 | tee publication-test-results.txt

      - name: Upload publication diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: publication-diagnostics-ubuntu
          path: publication-test-results.txt
          if-no-files-found: warn
          retention-days: 1

  platform-smoke-windows:
    name: platform-smoke-windows
    needs: classify-changes
    if: needs.classify-changes.outputs.run_windows == 'true'
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-publication.txt

      - name: Set up Node and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Windows publication dependencies
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate
          choco install libreoffice-fresh -y --no-progress
          $popplerVersion = "24.08.0-0"
          $popplerUrl = "https://github.com/oschwartz10612/poppler-windows/releases/download/v$popplerVersion/Release-$popplerVersion.zip"
          $popplerZip = Join-Path $env:RUNNER_TEMP "poppler-$popplerVersion.zip"
          $popplerRoot = Join-Path $env:RUNNER_TOOL_CACHE "poppler-$popplerVersion"
          Invoke-WebRequest -Uri $popplerUrl -OutFile $popplerZip
          $actualHash = (Get-FileHash -Algorithm SHA256 $popplerZip).Hash
          $expectedHash = "58A6F9AE269756231D2F9AA6CBA39D75FEC6DEACAF3C4A50683383B5F3D5A527"
          if ($actualHash -ne $expectedHash) {
            throw "Poppler archive SHA-256 mismatch: expected $expectedHash, got $actualHash"
          }
          Expand-Archive -LiteralPath $popplerZip -DestinationPath $popplerRoot
          python -m pip install --upgrade pip
          python -m pip install -r requirements-publication.txt
          pnpm install --frozen-lockfile

      - name: Run Windows publication smoke tests
        shell: pwsh
        env:
          BASE_LIBREOFFICE: C:\Program Files\LibreOffice\program\soffice.exe
          BASE_PDFTOPPM: ${{ runner.tool_cache }}\poppler-24.08.0-0\poppler-24.08.0\Library\bin\pdftoppm.exe
          PUPPETEER_EXECUTABLE_PATH: C:\Program Files\Google\Chrome\Application\chrome.exe
          PYTHONIOENCODING: utf-8
        run: |
          if (-not (Test-Path -LiteralPath $env:BASE_PDFTOPPM)) {
            throw "pdftoppm.exe not found at pinned path: $env:BASE_PDFTOPPM"
          }
          python tools/check_publication_environment.py --require-mermaid
          python -m unittest tests.test_design_document_generation tests.test_policy_driven_publication tests.test_project_skill_map_generation tests.test_ui_art_audit -v

  ci-gate:
    name: ci-gate
    needs:
      - classify-changes
      - docs-validation
      - ubuntu-contract
      - publication-validation
      - platform-smoke-windows
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate required validation jobs
        shell: bash
        env:
          CLASSIFY_RESULT: ${{ needs.classify-changes.result }}
          DOCS_RESULT: ${{ needs.docs-validation.result }}
          CONTRACT_REQUIRED: ${{ needs.classify-changes.outputs.run_contract }}
          CONTRACT_RESULT: ${{ needs.ubuntu-contract.result }}
          PUBLICATION_REQUIRED: ${{ needs.classify-changes.outputs.run_publication }}
          PUBLICATION_RESULT: ${{ needs.publication-validation.result }}
          WINDOWS_REQUIRED: ${{ needs.classify-changes.outputs.run_windows }}
          WINDOWS_RESULT: ${{ needs.platform-smoke-windows.result }}
        run: |
          set -euo pipefail
          failed=0

          require_success() {
            local job_name="$1"
            local required="$2"
            local result="$3"
            if [[ "$required" == "true" && "$result" != "success" ]]; then
              echo "required job failed or was not executed: $job_name (result=$result)"
              failed=1
            fi
          }

          if [[ "$CLASSIFY_RESULT" != "success" ]]; then
            echo "required job failed or was not executed: classify-changes (result=$CLASSIFY_RESULT)"
            failed=1
          fi
          if [[ "$DOCS_RESULT" != "success" ]]; then
            echo "required job failed or was not executed: docs-validation (result=$DOCS_RESULT)"
            failed=1
          fi

          require_success "ubuntu-contract" "$CONTRACT_REQUIRED" "$CONTRACT_RESULT"
          require_success "publication-validation" "$PUBLICATION_REQUIRED" "$PUBLICATION_RESULT"
          require_success "platform-smoke-windows" "$WINDOWS_REQUIRED" "$WINDOWS_RESULT"

          if [[ "$failed" -ne 0 ]]; then
            exit 1
          fi

          echo "CI gate passed"
