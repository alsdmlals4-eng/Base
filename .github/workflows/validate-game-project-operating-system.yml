name: Validate Game Project Operating System

on:
  pull_request:
    paths:
      - "START_HERE.md"
      - "AGENTS.md"
      - "README.md"
      - "docs/**"
      - "skills/**"
      - "tools/**"
      - "schemas/**"
      - '\[수정제안서\]/**'
      - "requirements-publication.txt"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "templates/project-operations/**"
      - "templates/planning/**"
      - "templates/quality/**"
      - "tests/test_*operating_system*.py"
      - "tests/test_documentation_governance.py"
      - "tests/test_skill_routing_governance.py"
      - "tests/test_design_document_*.py"
      - "tests/test_policy_driven_publication.py"
      - "tests/test_consolidated_skill_references.py"
      - "tests/test_reference_freshness.py"
      - "tests/test_project_skill_map_generation.py"
      - "tests/test_base_change_proposals.py"
      - "tests/test_deep_interview_contract.py"
      - "tests/test_ui_art_audit.py"
      - ".github/reference-freshness.json"
      - ".github/workflows/validate-game-project-operating-system.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-operating-system:
    name: validate-operating-system
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: corepack enable && corepack prepare pnpm@11.9.0 --activate

      - name: Install document publication dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-writer fonts-nanum poppler-utils
          python -m pip install --upgrade pip
          python -m pip install -r requirements-publication.txt
          pnpm install --frozen-lockfile

      - name: Check Python syntax
        run: |
          python -m py_compile \
            tools/build_project_skill_map.py \
            tools/skill_map_diagrams.py \
            tools/build_design_documents.py \
            tools/build_policy_driven_design_documents.py \
            tools/design_document_diagrams.py \
            tools/publication_v3.py \
            tools/check_publication_environment.py \
            tools/check_base_change_proposals.py \
            tools/check_interview_contract.py \
            tools/audit_external_source.py \
            tools/check_canonical_reference_freshness.py \
            skills/auditing-and-refining-ui-art/scripts/scan_ui_art_signals.py \
            templates/project-operations/github/check_documentation_governance.py \
            templates/project-operations/github/check_skill_routing_governance.py \
            templates/project-operations/github/check_design_document_publications.py \
            tests/test_documentation_governance.py \
            tests/test_skill_routing_governance.py \
            tests/test_design_document_publication_governance.py \
            tests/test_design_document_generation.py \
            tests/test_policy_driven_publication.py \
            tests/test_consolidated_skill_references.py \
            tests/test_reference_freshness.py \
            tests/test_project_skill_map_generation.py \
            tests/test_game_project_operating_system_structure.py \
            tests/test_base_change_proposals.py \
            tests/test_deep_interview_contract.py \
            tests/test_ui_art_audit.py

      - name: Validate Base change proposals
        if: github.event_name == 'pull_request'
        run: python tools/check_base_change_proposals.py --base-ref "${{ github.event.pull_request.base.sha }}"

      - name: Check canonical reference freshness
        if: github.event_name == 'pull_request'
        run: |
          python tools/check_canonical_reference_freshness.py \
            --config .github/reference-freshness.json \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}"

      - name: Run operating system regression and generation tests
        id: regression
        shell: bash
        run: |
          set +e
          python -m unittest \
            tests/test_documentation_governance.py \
            tests/test_skill_routing_governance.py \
            tests/test_design_document_publication_governance.py \
            tests/test_design_document_generation.py \
            tests/test_policy_driven_publication.py \
            tests/test_consolidated_skill_references.py \
            tests/test_reference_freshness.py \
            tests/test_project_skill_map_generation.py \
            tests/test_base_change_proposals.py \
            tests/test_deep_interview_contract.py \
            tests/test_ui_art_audit.py \
            tests/test_game_project_operating_system_structure.py \
            -v 2>&1 | tee operating-system-test-results.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome

      - name: Upload operating system test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: operating-system-test-report
          path: operating-system-test-results.txt
          if-no-files-found: error
          retention-days: 1

  validate-publications-windows:
    name: validate-publications-windows
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install Windows publication dependencies
        shell: pwsh
        run: |
          choco install libreoffice-fresh -y --no-progress
          $popplerVersion = "24.08.0-0"
          $popplerUrl = "https://github.com/oschwartz10612/poppler-windows/releases/download/v$popplerVersion/Release-$popplerVersion.zip"
          $popplerZip = Join-Path $env:RUNNER_TEMP "poppler-$popplerVersion.zip"
          $popplerRoot = Join-Path $env:RUNNER_TOOL_CACHE "poppler-$popplerVersion"
          Invoke-WebRequest -Uri $popplerUrl -OutFile $popplerZip
          $actualHash = (Get-FileHash -Algorithm SHA256 $popplerZip).Hash
          $expectedHash = "58A6F9AE269756231D2F9AA6CBA39D75FEC6DEACAF3C4A50683383B5F3D5A527"
          if ($actualHash -ne $expectedHash) {
            throw "Poppler archive SHA-256 mismatch: expected $expectedHash, got $actualHash"
          }
          Expand-Archive -LiteralPath $popplerZip -DestinationPath $popplerRoot
          python -m pip install --upgrade pip
          python -m pip install -r requirements-publication.txt
          pnpm install --frozen-lockfile

      - name: Run Windows publication smoke tests
        shell: pwsh
        env:
          BASE_LIBREOFFICE: C:\Program Files\LibreOffice\program\soffice.exe
          BASE_PDFTOPPM: ${{ runner.tool_cache }}\poppler-24.08.0-0\poppler-24.08.0\Library\bin\pdftoppm.exe
          PUPPETEER_EXECUTABLE_PATH: C:\Program Files\Google\Chrome\Application\chrome.exe
          PYTHONIOENCODING: utf-8
        run: |
          if (-not (Test-Path -LiteralPath $env:BASE_PDFTOPPM)) {
            throw "pdftoppm.exe not found at pinned path: $env:BASE_PDFTOPPM"
          }
          python tools/check_publication_environment.py --require-mermaid
          python -m unittest tests.test_design_document_generation tests.test_policy_driven_publication tests.test_project_skill_map_generation tests.test_ui_art_audit -v

  validate-whitespace:
    name: validate-whitespace
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Create whitespace report
        id: whitespace
        shell: bash
        run: |
          set +e
          git diff --check \
            "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
            > whitespace-errors.txt 2>&1
          status=$?
          cat whitespace-errors.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload whitespace report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: whitespace-report
          path: whitespace-errors.txt
          if-no-files-found: error
          retention-days: 1
