name: Temporary skill system expansion and optimization

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.ref == 'agent/expand-and-optimize-skill-system' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply skill expansion
        run: python tools/apply_skill_system_expansion.py

      - name: Install validation dependency
        run: python -m pip install jsonschema

      - name: Run focused skill and structure checks
        run: |
          python -m unittest \
            tests.test_game_project_operating_system_structure \
            tests.test_skill_package_integrity \
            tests.test_consolidated_skill_references \
            tests.test_reference_freshness \
            tests.test_skill_system_coverage
          python tools/check_skill_system_coverage.py
          git diff --check

      - name: Validate canonical reference freshness
        run: |
          python tools/check_canonical_reference_freshness.py \
            --config .github/reference-freshness.json \
            --base origin/main \
            --head HEAD

      - name: Commit optimized skill system
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Expand and optimize Base skill system"

      - name: Push optimized branch
        run: git push origin HEAD:${{ github.event.pull_request.head.ref }}
