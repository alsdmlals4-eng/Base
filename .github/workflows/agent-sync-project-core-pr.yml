name: Temporary project core skill synchronization

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.ref == 'agent/add-project-core-and-adversarial-skills' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract and run synchronized patch
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/agent-apply-project-core-skills.yml')
          lines = source.read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(lines) if "python - <<'PY'" in line) + 1
          end = next(i for i in range(start, len(lines)) if lines[i].strip() == 'PY')
          body = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines[start:end]) + '\n'
          Path('/tmp/apply_project_core_skills.py').write_text(body, encoding='utf-8')
          PY
          python /tmp/apply_project_core_skills.py
          rm -f .github/workflows/agent-apply-project-core-skills-pr.yml
          rm -f tmp/trigger-project-core-sync.txt

      - name: Install validation dependency
        run: python -m pip install jsonschema

      - name: Run focused regression tests
        run: |
          python -m unittest \
            tests.test_game_project_operating_system_structure \
            tests.test_skill_package_integrity \
            tests.test_consolidated_skill_references \
            tests.test_reference_freshness
          git diff --check

      - name: Commit synchronized changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Register project core and adversarial review skills"

      - name: Validate canonical reference freshness
        run: |
          python tools/check_canonical_reference_freshness.py \
            --config .github/reference-freshness.json \
            --base origin/main \
            --head HEAD

      - name: Push synchronized branch
        run: git push origin HEAD:${{ github.event.pull_request.head.ref }}
